trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  applicationVersion: 1.0.0

name: $(applicationVersion).$(Rev:r)

stages:
- stage: 'Build'
  displayName: 'Build'
  jobs:
  - template: 'Templates/build.yaml'
    parameters:
      applicationVersion: $(applicationVersion)

- stage: NugetPublish
  displayName: Publish package to NuGet
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: WaitForValidation
    displayName: Wait for approval
    pool: server
    timeoutInMinutes: 21600 # job times out in 15 days, can't be a variable
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 21600 # job times out in 15 days, can't be a variable
      inputs:
        notifyUsers: |
          nizzotyphoon41@hotmail.com
        instructions: 'Please approve production deploy so it could be executed'
        onTimeout: reject
  - deployment: Publish
    environment: Publish to NuGet
    variables:
    - group: Deploy
    dependsOn: WaitForValidation
    condition: succeeded('WaitForValidation')
    strategy:
      runOnce:
        deploy:
          steps:
          - download: none
          - task: UseDotNet@2
            displayName: 'Set .Net version'
            inputs:
              version: 10.0.x
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'specific'
              artifactName: 'NDDD-$(Build.BuildNumber)'
              downloadPath: '$(System.ArtifactsDirectory)'
          - task: CmdLine@2
            displayName: 'Check if version already exists on NuGet'
            inputs:
              script: |
                VERSION=$(unzip -p "$(System.ArtifactsDirectory)/NDDD-$(Build.BuildNumber)/Gmf.NDDD.$(applicationVersion).nupkg" "*.nuspec" 2>/dev/null | grep -oP '(?<=<version>)[^<]+' | head -1)
                echo "Package version from nupkg: $VERSION"
                HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://api.nuget.org/v3-flatcontainer/gmf.nddd/$VERSION/gmf.nddd.$VERSION.nupkg")
                echo "NuGet flat container status for $VERSION: $HTTP"
                if [ "$HTTP" = "200" ]; then
                  echo "##[warning] Version $VERSION already exists on nuget.org"
                else
                  echo "Version $VERSION does not exist on nuget.org - proceeding to push"
                fi
          - task: CmdLine@2
            displayName: 'Push NuGet Package'
            inputs:
              script: 'dotnet nuget push "$(System.ArtifactsDirectory)/NDDD-$(Build.BuildNumber)/*.nupkg" -k $(NugetApiKey) -s "https://api.nuget.org/v3/index.json" --skip-duplicate --no-symbols'