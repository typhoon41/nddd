trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  applicationVersion: 0.1.5

name: $(applicationVersion).$(Rev:r)

stages:
- stage: 'Build'
  displayName: 'Build'
  jobs:
  - template: 'Templates/build.yaml'
    parameters:
      applicationVersion: $(applicationVersion)

- stage: NugetPublish
  displayName: Publish package to NuGet
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: WaitForValidation
    displayName: Wait for approval
    pool: server
    timeoutInMinutes: 21600 # job times out in 15 days, can't be a variable
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 21600 # job times out in 15 days, can't be a variable
      inputs:
        notifyUsers: |
          nizzotyphoon41@hotmail.com
        instructions: 'Please approve production deploy so it could be executed'
        onTimeout: reject
  - deployment: Publish
    environment: Publish to NuGet
    variables:
    - group: Deploy
    dependsOn: WaitForValidation
    condition: succeeded('WaitForValidation')
    strategy:
      runOnce:
        deploy:
          steps:
          - download: none
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'specific'
              artifactName: 'NDDD-$(Build.BuildNumber)'
              downloadPath: '$(System.ArtifactsDirectory)'
          - task: CmdLine@2
            displayName: 'List packages to push'
            inputs:
              script: 'find "$(System.ArtifactsDirectory)" -name "*.nupkg" && dotnet --version'
          - task: CmdLine@2
            displayName: 'Push NuGet Package'
            inputs:
              script: |
                NUPKG=$(find "$(System.ArtifactsDirectory)" -name "*.nupkg" ! -name "*.symbols.nupkg" | head -1)
                echo "Pushing: $NUPKG"
                curl -s -o response.txt -w "HTTP_STATUS:%{http_code}" \
                  -X PUT "https://www.nuget.org/api/v2/package/" \
                  -H "X-NuGet-ApiKey: $(NugetApiKey)" \
                  -F "package=@$NUPKG;type=application/octet-stream"
                echo ""
                echo "NuGet response body:"
                cat response.txt